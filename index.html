<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Moses 💙</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    background:linear-gradient(135deg,#89CFF0,#4FACFE,#1E3A8A);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.love{
    position:absolute;
    top:-20px;
    color:white;
    animation:fall linear infinite;
    opacity:0.7;
}

@keyframes fall{
    0%{transform:translateY(-10vh);}
    100%{transform:translateY(110vh);}
}

.star{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    animation:blink 1s infinite alternate;
}

@keyframes blink{
    from{opacity:0.2;}
    to{opacity:1;}
}

.openingScreen{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#89CFF0,#4FACFE,#1E3A8A);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.hidden{display:none;}

.openBox{
    text-align:center;
    background:rgba(255,255,255,0.18);
    padding:40px;
    border-radius:30px;
    backdrop-filter:blur(10px);
}

.slider{
    width:90%;
    max-width:760px;
}

.slide{
    display:none;
    background:rgba(255,255,255,0.18);
    padding:35px;
    border-radius:30px;
    text-align:center;
}

.slide.active{display:block;}

.buttons{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:15px;
}

button{
    padding:12px 24px;
    border:none;
    border-radius:30px;
    background:white;
    color:#1E3A8A;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- 🔊 AUDIO FIX -->
<audio id="musik" loop>
<source src="https://files.catbox.moe/8f3p7v.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("click", function(){
    document.getElementById("musik").play();
}, { once: true });
</script>

<!-- LOVE -->
<script>
for(let i=0;i<50;i++){
    let love=document.createElement("div");
    love.classList.add("love");
    love.innerHTML="💙";
    love.style.left=Math.random()*100+"vw";
    love.style.animationDuration=(Math.random()*4+3)+"s";
    love.style.fontSize=(Math.random()*20+15)+"px";
    document.body.appendChild(love);
}
</script>

<!-- SCREEN -->
<div class="openingScreen" id="screen1">
<div class="openBox">
<h1>🎁 Wait...</h1>
<button onclick="nextScreen(1)">Yes 💙</button>
</div>
</div>

<div class="openingScreen hidden" id="screen2">
<div class="openBox">
<h1>Promise?</h1>
<button onclick="nextScreen(2)">Promise ✨</button>
</div>
</div>

<div class="openingScreen hidden" id="screen3">
<div class="openBox">
<h1>Open Gift 🎁</h1>
<button onclick="openGift()">Open</button>
</div>
</div>

<div class="slider">
<div class="slide active">
<h1>🎂 Happy Birthday 🎂</h1>
<p>Happy birthday Moses 💙</p>
</div>

<div class="slide">
<h1>✨ I Wish</h1>
<p>Semoga semua impianmu tercapai ✨</p>
</div>

<div class="buttons">
<button onclick="prevSlide()">⬅</button>
<button onclick="nextSlide()">➡</button>
</div>
</div>

<script>
let slides=document.querySelectorAll(".slide");
let current=0;

function showSlide(i){
slides.forEach(s=>s.classList.remove("active"));
slides[i].classList.add("active");
}

function nextSlide(){
current=(current+1)%slides.length;
showSlide(current);
}

function prevSlide(){
current=(current-1+slides.length)%slides.length;
showSlide(current);
}

function nextScreen(n){
document.getElementById("screen"+n).style.display="none";
document.getElementById("screen"+(n+1)).style.display="flex";
}

function openGift(){
document.getElementById("screen3").style.display="none";
}
</script>

</body>
</html>
